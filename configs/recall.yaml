search:
  index_type: hybrid_bm25_tfidf
  analyzer: char
  ngram_range: [1, 2]
  min_df: 2
  max_features: 200000
  text_fields:
    - note_title
    - note_content
    - taxonomy1_id
    - taxonomy2_id
    - taxonomy3_id
  top_k: 200

twotower:
  embedding_dim: 64
  hidden_dims: [128, 64]
  negatives_per_positive: 3
  learning_rate: 0.001
  weight_decay: 0.000001
  candidate_top_k: 200
